<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>短編台本</title>
  <style>
/* Base Styles */
.script-container {
  font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
  font-size: 16px;
  line-height: 1.8;
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem;
}

.script-title {
  text-align: center;
  font-size: 2em;
  font-weight: bold;
  margin: 0 0 1rem 0;
}

.script-author {
  text-align: center;
  font-size: 1.1em;
  margin: 0 0 2rem 0;
  color: #666;
}

.characters-headline {
  font-size: 1.5em;
  font-weight: bold;
  margin: 2rem 0 1rem 0;
  border-bottom: 2px solid #333;
  padding-bottom: 0.5rem;
}

.character {
  margin: 0.5rem 0;
  padding: 0.5rem;
  border-radius: 4px;
}

.character-name {
  font-weight: bold;
  margin-right: 1rem;
}

.character-description {
  color: #666;
}

.scene-heading {
  font-weight: bold;
  margin: 2rem 0 1rem 0;
  padding: 0.5rem 0;
}

.scene-heading-1 {
  font-size: 1.4em;
  border-bottom: 1px solid #333;
}

.scene-heading-2 {
  font-size: 1.2em;
}

.scene-heading-3 {
  font-size: 1.1em;
}

.dialogue {
  margin: 1rem 0;
  padding-left: 2rem;
}

.dialogue .character-name {
  font-weight: bold;
  margin-bottom: 0.25rem;
  text-transform: uppercase;
}

.dialogue-text {
  margin-left: 1rem;
}

.direction {
  margin: 1rem 0;
  font-style: italic;
  color: #555;
  padding: 0.5rem;
  border-radius: 4px;
}

.comment {
  margin: 1rem 0;
  font-size: 0.9em;
  color: #888;
  font-style: italic;
  padding: 0.5rem;
  border-left: 3px solid #ddd;
}

.endmark {
  text-align: right;
  font-weight: bold;
  font-size: 1.2em;
  margin: 2rem 0;
  padding: 1rem;
}

.empty-line {
  height: 1em;
}

.unknown-element {
  color: #ff0000;
  padding: 0.5rem;
  border: 1px solid #ff9999;
  margin: 0.5rem 0;
}
</style>
</head>
<body>
<div class="script-container" data-writing-mode="horizontal" data-theme="light">
<h1 class="script-title">短編台本</h1>
<div class="script-author">山田太郎</div>
<h2 class="characters-headline">登場人物</h2>
<div class="character">
  <span class="character-name">太郎</span>
  <span class="character-description">主人公、20代男性</span>
</div>
<div class="character">
  <span class="character-name">花子</span>
  <span class="character-description">ヒロイン、20代女性</span>
</div>
<div class="comment">これは台本のプロローグです。</div>
<h2 class="scene-heading scene-heading-1">シーン1 - 公園</h2>
<div class="dialogue" data-character="太郎">
  <div class="character-name">太郎</div>
  <div class="dialogue-text">こんにちは、花子さん</div>
</div>
<div class="dialogue" data-character="花子">
  <div class="character-name">花子</div>
  <div class="dialogue-text">あら、太郎さん。こんにちは</div>
</div>
<div class="direction">太郎が花子に近づく。<br>二人は公園のベンチに座る。</div>
<div class="dialogue" data-character="太郎">
  <div class="character-name">太郎</div>
  <div class="dialogue-text">今日はいい天気ですね。<br>こんな日は散歩するのが<br>一番気持ちいいですよね。</div>
</div>
<div class="dialogue" data-character="花子">
  <div class="character-name">花子</div>
  <div class="dialogue-text">そうですね。散歩日和です</div>
</div>
<div class="direction">風が吹いて桜の花びらが舞う。</div>
<div class="direction">夕日が二人を照らしている。</div>
<div class="endmark">THE END</div>
<div class="comment">これは奥付です。</div>
</div>
</body>
</html>
